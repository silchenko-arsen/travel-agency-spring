spring:
  datasource:
    url: jdbc:h2:mem:travel_agency;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

app:
  mail:
    enabled: false

  jwt:
    cookie-name: JWT_TOKEN
    secret: dev-secret-key-dev-secret-key-dev-secret-key-dev-secret-key
    expiration-seconds: 3600

logging:
  level:
    com.example.travelagency: DEBUG