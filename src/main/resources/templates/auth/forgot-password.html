<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{auth.forgot.title}">Forgot password</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<main class="container card">
    <h1 th:text="#{auth.forgot.title}">Forgot password</h1>

    <p class="success" th:if="${successMessage}" th:text="${successMessage}"></p>
    <p class="error" th:if="${resetError}" th:text="${resetError}"></p>

    <form th:action="@{/auth/forgot-password}" method="post">
        <label for="email">
            <span th:text="#{auth.forgot.email}">Email</span>
        </label>

        <input id="email"
               type="email"
               name="email"
               required
               autocomplete="email">

        <button type="submit" th:text="#{auth.forgot.send}">
            Send reset code
        </button>
    </form>

    <p>
        <a th:href="@{/auth/reset-password}" th:text="#{auth.forgot.haveCode}">
            I already have a reset code
        </a>
    </p>

    <p>
        <a th:href="@{/auth/login}" th:text="#{auth.forgot.backToLogin}">
            Back to login
        </a>
    </p>
</main>

</body>
</html>
