<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{auth.verify.title}">Verify Email</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<div class="language-switch">
    <a th:href="@{/auth/verify(email=${verifyEmailRequest.email}, lang='uk')}">UA</a>
    <span>|</span>
    <a th:href="@{/auth/verify(email=${verifyEmailRequest.email}, lang='en')}">EN</a>
</div>

<main class="container card">
    <h1 th:text="#{auth.verify.title}">Verify Email</h1>

    <p class="success" th:if="${successMessage}" th:text="${successMessage}"></p>
    <p class="error" th:if="${verifyError}" th:text="${verifyError}"></p>

    <form th:action="@{/auth/verify}" th:object="${verifyEmailRequest}" method="post">
        <label>
            <span th:text="#{auth.verify.email}">Email</span>
            <input id="verifyEmail" type="email" th:field="*{email}" required>
        </label>
        <span class="error" th:errors="*{email}"></span>

        <label>
            <span th:text="#{auth.verify.code}">Verification code</span>
            <input type="text" th:field="*{code}" required>
        </label>
        <span class="error" th:errors="*{code}"></span>

        <button type="submit" th:text="#{auth.verify.button}">
            Verify
        </button>
    </form>

    <hr>

    <form th:action="@{/auth/resend-code}" method="post">
        <input id="resendEmail" type="hidden" name="email" th:value="${verifyEmailRequest.email}">

        <button type="submit" th:text="#{auth.verify.resend}">
            Resend code
        </button>
    </form>

    <p>
        <a th:href="@{/auth/login}" th:text="#{auth.verify.login}">
            Already verified? Login
        </a>
    </p>
</main>

<script>
    const verifyEmailInput = document.getElementById('verifyEmail');
    const resendEmailInput = document.getElementById('resendEmail');

    if (verifyEmailInput && resendEmailInput) {
        verifyEmailInput.addEventListener('input', function () {
            resendEmailInput.value = verifyEmailInput.value;
        });
    }
</script>

</body>
</html>
