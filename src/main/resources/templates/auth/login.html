<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{auth.login.pageTitle}">Login | Travel Agency</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<main class="container">
    <h2 th:text="#{auth.login.title}">Login</h2>

    <div class="success"
         th:if="${param.verified}"
         th:text="#{auth.login.verified}">
        Email verified successfully. You can login now.
    </div>

    <div class="error"
         th:if="${loginError}"
         th:text="${loginError}">
    </div>

    <form th:action="@{/auth/login}" th:object="${loginRequest}" method="post">

        <div>
            <label for="email" th:text="#{auth.login.email}">Email</label>

            <input id="email"
                   type="email"
                   th:field="*{email}"
                   th:placeholder="#{auth.login.email.placeholder}"
                   required
                   autocomplete="email">

            <div class="error"
                 th:if="${#fields.hasErrors('email')}"
                 th:errors="*{email}">
            </div>
        </div>

        <div>
            <label for="password" th:text="#{auth.login.password}">Password</label>

            <input id="password"
                   type="password"
                   th:field="*{password}"
                   th:placeholder="#{auth.login.password.placeholder}"
                   required
                   autocomplete="current-password">

            <div class="error"
                 th:if="${#fields.hasErrors('password')}"
                 th:errors="*{password}">
            </div>
        </div>

        <button type="submit" th:text="#{auth.login.button}">
            Login
        </button>
    </form>

    <p>
        <span th:text="#{auth.login.forgotQuestion}">Forgot password?</span>
        <a th:href="@{/auth/forgot-password}" th:text="#{auth.login.resetLink}">
            Reset password
        </a>
    </p>

    <p>
        <span th:text="#{auth.login.noAccount}">Don’t have an account?</span>
        <a th:href="@{/auth/register}" th:text="#{auth.login.registerLink}">
            Register
        </a>
    </p>
</main>

</body>
</html>
