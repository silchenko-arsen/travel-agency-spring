<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | Travel Agency</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header>
    <h1>Travel Agency</h1>
    <nav>
        <a th:href="@{/tours}">Tours</a>
    </nav>
</header>

<main class="container">
    <h2>Login</h2>

    <div class="success" th:if="${param.verified}">
        Email verified successfully. You can login now.
    </div>

    <div class="error" th:if="${loginError}" th:text="${loginError}"></div>

    <form th:action="@{/auth/login}" th:object="${loginRequest}" method="post">

        <div>
            <label for="email">Email</label>
            <input id="email" type="email" th:field="*{email}" placeholder="email@example.com">
            <div class="error"
                 th:if="${#fields.hasErrors('email')}"
                 th:errors="*{email}">
            </div>
        </div>

        <div>
            <label for="password">Password</label>
            <input id="password" type="password" th:field="*{password}" placeholder="Password">
            <div class="error"
                 th:if="${#fields.hasErrors('password')}"
                 th:errors="*{password}">
            </div>
        </div>

        <button type="submit">Login</button>
    </form>

    <p>
        Forgot password?
        <a th:href="@{/auth/forgot-password}">Reset password</a>
    </p>

    <p>
        Don’t have an account?
        <a th:href="@{/auth/register}">Register</a>
    </p>
</main>

</body>
</html>
