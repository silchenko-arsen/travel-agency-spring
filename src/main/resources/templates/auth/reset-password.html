<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><title>Reset password</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container card">
    <h1>Reset password</h1>
    <p class="success" th:if="${success}" th:text="${success}"></p>
    <form th:action="@{/auth/reset-password}" th:object="${resetForm}" method="post">
        <label>Token <input th:field="*{token}"></label><span class="error" th:errors="*{token}"></span>
        <label>New password <input type="password" th:field="*{password}"></label><span class="error" th:errors="*{password}"></span>
        <label>Confirm password <input type="password" th:field="*{confirmPassword}"></label><span class="error" th:errors="*{confirmPassword}"></span>
        <span class="error" th:errors="*{passwordsMatching}"></span>
        <button type="submit">Change password</button>
    </form>
</main>
</body>
</html>
