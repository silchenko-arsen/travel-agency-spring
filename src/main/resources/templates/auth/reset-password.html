<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{auth.reset.title}">Reset password</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<main class="container card">
    <h1 th:text="#{auth.reset.title}">Reset password</h1>

    <p class="success" th:if="${successMessage}" th:text="${successMessage}"></p>
    <p class="error" th:if="${resetError}" th:text="${resetError}"></p>

    <form th:action="@{/auth/reset-password}" method="post">
        <label for="email">
            <span th:text="#{auth.reset.email}">Email</span>
        </label>

        <input id="email"
               type="email"
               name="email"
               th:value="${email}"
               required
               autocomplete="email">

        <label for="token">
            <span th:text="#{auth.reset.token}">Reset code</span>
        </label>

        <input id="token"
               type="text"
               name="token"
               required
               autocomplete="one-time-code">

        <label for="newPassword">
            <span th:text="#{auth.reset.newPassword}">New password</span>
        </label>

        <input id="newPassword"
               type="password"
               name="newPassword"
               required
               autocomplete="new-password">

        <button type="submit" th:text="#{auth.reset.button}">
            Reset password
        </button>
    </form>

    <p>
        <a th:href="@{/auth/forgot-password}" th:text="#{auth.reset.sendNewCode}">
            Send new reset code
        </a>
    </p>

    <p>
        <a th:href="@{/auth/login}" th:text="#{auth.reset.backToLogin}">
            Back to login
        </a>
    </p>
</main>

</body>
</html>
