<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{auth.reset.title}">Reset password</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<main class="container card">
    <h1 th:text="#{auth.reset.title}">Reset password</h1>

    <p class="success" th:if="${successMessage}" th:text="${successMessage}"></p>
    <p class="error" th:if="${resetError}" th:text="${resetError}"></p>

    <form th:action="@{/auth/reset-password}" method="post">
        <label>
            <span th:text="#{auth.reset.email}">Email</span>
            <input type="email" name="email" th:value="${email}" required>
        </label>

        <label>
            <span th:text="#{auth.reset.token}">Reset code</span>
            <input type="text" name="token" required>
        </label>

        <label>
            <span th:text="#{auth.reset.newPassword}">New password</span>
            <input type="password" name="newPassword" minlength="8" required>
        </label>

        <button type="submit" th:text="#{auth.reset.button}">
            Reset password
        </button>
    </form>

    <p>
        <a th:href="@{/auth/forgot-password}" th:text="#{auth.forgot.title}">
            Send new reset code
        </a>
    </p>

    <p>
        <a th:href="@{/auth/login}" th:text="#{auth.login.title}">
            Back to login
        </a>
    </p>
</main>

</body>
</html>
