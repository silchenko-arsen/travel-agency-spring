<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{auth.register.pageTitle}">Register | Travel Agency</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<main class="container">
    <h2 th:text="#{auth.register.title}">Register</h2>

    <div class="error"
         th:if="${registerError}"
         th:text="${registerError}">
    </div>

    <form th:action="@{/auth/register}" th:object="${registerRequest}" method="post">

        <div>
            <label for="email" th:text="#{auth.register.email}">Email</label>
            <input id="email"
                   type="email"
                   th:field="*{email}"
                   th:placeholder="#{auth.register.email.placeholder}">

            <div class="error"
                 th:if="${#fields.hasErrors('email')}"
                 th:errors="*{email}">
            </div>
        </div>

        <div>
            <label for="password" th:text="#{auth.register.password}">Password</label>
            <input id="password"
                   type="password"
                   th:field="*{password}"
                   th:placeholder="#{auth.register.password.placeholder}">

            <div class="error"
                 th:if="${#fields.hasErrors('password')}"
                 th:errors="*{password}">
            </div>
        </div>

        <div>
            <label for="firstName" th:text="#{auth.register.firstName}">First name</label>
            <input id="firstName"
                   type="text"
                   th:field="*{firstName}"
                   th:placeholder="#{auth.register.firstName.placeholder}">

            <div class="error"
                 th:if="${#fields.hasErrors('firstName')}"
                 th:errors="*{firstName}">
            </div>
        </div>

        <div>
            <label for="lastName" th:text="#{auth.register.lastName}">Last name</label>
            <input id="lastName"
                   type="text"
                   th:field="*{lastName}"
                   th:placeholder="#{auth.register.lastName.placeholder}">

            <div class="error"
                 th:if="${#fields.hasErrors('lastName')}"
                 th:errors="*{lastName}">
            </div>
        </div>

        <div>
            <label for="phone" th:text="#{auth.register.phone}">Phone</label>
            <input id="phone"
                   type="text"
                   th:field="*{phone}"
                   th:placeholder="#{auth.register.phone.placeholder}">

            <div class="error"
                 th:if="${#fields.hasErrors('phone')}"
                 th:errors="*{phone}">
            </div>
        </div>

        <button type="submit" th:text="#{auth.register.button}">
            Register
        </button>
    </form>

    <p>
        <span th:text="#{auth.register.haveAccount}">Already have an account?</span>
        <a th:href="@{/auth/login}" th:text="#{auth.login.title}">
            Login
        </a>
    </p>
</main>

</body>
</html>
