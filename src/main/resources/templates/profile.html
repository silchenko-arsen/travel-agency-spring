<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{profile.title}">Profile</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<main class="container card">
    <h1 th:text="#{profile.title}">Profile</h1>

    <p class="success" th:if="${success}" th:text="${success}"></p>
    <p class="success" th:if="${passwordSuccess}" th:text="${passwordSuccess}"></p>
    <p class="error" th:if="${passwordError}" th:text="${passwordError}"></p>

    <p>
        <b th:text="#{profile.email}">Email:</b>
        <span th:text="${user.email}"></span>
    </p>

    <p>
        <b th:text="#{profile.balance}">Balance:</b>
        <span th:text="${user.balance}"></span>
        <span th:text="#{profile.currency}">UAH</span>
    </p>

    <hr>

    <h2 th:text="#{profile.update.title}">Update info</h2>

    <form th:action="@{/profile}" th:object="${profileForm}" method="post">
        <label>
            <span th:text="#{profile.firstName}">First name</span>
            <input th:field="*{firstName}">
        </label>
        <span class="error" th:errors="*{firstName}"></span>

        <label>
            <span th:text="#{profile.lastName}">Last name</span>
            <input th:field="*{lastName}">
        </label>
        <span class="error" th:errors="*{lastName}"></span>

        <label>
            <span th:text="#{profile.phone}">Phone</span>
            <input th:field="*{phone}">
        </label>
        <span class="error" th:errors="*{phone}"></span>

        <button type="submit" th:text="#{common.save}">Save</button>
    </form>

    <hr>

    <h2 th:text="#{profile.balance.title}">Top up balance</h2>

    <form th:action="@{/profile/balance}" th:object="${balanceForm}" method="post">
        <label>
            <span th:text="#{profile.balance.amount}">Amount</span>
            <input type="number" step="0.01" min="0.01" th:field="*{amount}">
        </label>
        <span class="error" th:errors="*{amount}"></span>

        <button type="submit" th:text="#{profile.balance.button}">Top up</button>
    </form>

    <hr>

    <section>
        <h2 th:text="#{profile.password.title}">Change password</h2>

        <form th:action="@{/profile/password}" method="post">
            <label>
                <span th:text="#{profile.password.old}">Old password</span>
                <input type="password" name="oldPassword" required>
            </label>

            <label>
                <span th:text="#{profile.password.new}">New password</span>
                <input type="password" name="newPassword" minlength="6" required>
            </label>

            <button type="submit" th:text="#{profile.password.button}">
                Update password
            </button>
        </form>
    </section>
</main>

</body>
</html>
