<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{tour.form.title}">Tour form</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<main class="container card">
    <h1 th:text="${mode == 'create'} ? #{tour.form.create.title} : #{tour.form.edit.title}">
        Tour
    </h1>

    <form th:action="${mode == 'create'} ? @{/admin/tours} : @{/admin/tours/{id}(id=${tourId})}"
          th:object="${tourForm}"
          method="post">

        <div class="error"
             th:if="${#fields.hasErrors('dateRangeValid')}"
             th:errors="*{dateRangeValid}">
            Date error
        </div>

        <label>
            <span th:text="#{tour.form.title.label}">Title</span>
            <input th:field="*{title}">
        </label>
        <span class="error" th:errors="*{title}"></span>

        <label>
            <span th:text="#{tour.form.description}">Description</span>
            <textarea th:field="*{description}"></textarea>
        </label>
        <span class="error" th:errors="*{description}"></span>

        <label>
            <span th:text="#{tour.form.country}">Country</span>
            <input th:field="*{country}">
        </label>
        <span class="error" th:errors="*{country}"></span>

        <label>
            <span th:text="#{tour.form.city}">City</span>
            <input th:field="*{city}">
        </label>
        <span class="error" th:errors="*{city}"></span>

        <label>
            <span th:text="#{tour.form.startDate}">Start date</span>
            <input type="date" th:field="*{startDate}">
        </label>
        <span class="error" th:errors="*{startDate}"></span>

        <label>
            <span th:text="#{tour.form.endDate}">End date</span>
            <input type="date" th:field="*{endDate}">
        </label>
        <span class="error" th:errors="*{endDate}"></span>

        <label>
            <span th:text="#{tour.form.price}">Price</span>
            <input type="number" step="0.01" th:field="*{price}">
        </label>
        <span class="error" th:errors="*{price}"></span>

        <label>
            <span th:text="#{tour.form.availablePlaces}">Available places</span>
            <input type="number" min="1" th:field="*{availablePlaces}">
        </label>
        <span class="error" th:errors="*{availablePlaces}"></span>

        <label class="checkbox-row">
            <input type="checkbox" th:field="*{hot}">
            <span th:text="#{tour.form.hot}">Hot</span>
        </label>

        <button type="submit" th:text="#{common.save}">Save</button>
    </form>

    <form th:if="${mode == 'edit'}"
          th:action="@{/admin/tours/{id}/delete(id=${tourId})}"
          method="post">
        <button class="danger" type="submit" th:text="#{common.delete}">
            Delete
        </button>
    </form>
</main>

</body>
</html>
